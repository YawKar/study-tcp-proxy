---
line_ending: lf
gitignore_excludes: true
formatter:
  type: basic
  indent: 2
  include_document_start: true
  line_ending: lf
  retain_line_breaks_single: true
  max_line_length: 0
  scan_folded_as_literal: true
  pad_line_comments: 1
  trim_trailing_whitespace: true
  eof_newline: true
  indent_root_array: false
